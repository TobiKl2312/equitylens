services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: equitylens
      POSTGRES_PASSWORD: equitylens
      POSTGRES_DB: equitylens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equitylens"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://equitylens:equitylens@db:5432/equitylens
      EDGAR_USER_AGENT: ${EDGAR_USER_AGENT:-EquityLens/0.1 (contact@example.com)}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
